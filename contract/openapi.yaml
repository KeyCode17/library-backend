openapi: 3.1.0
info:
  title: Library Backend API
  version: 0.1.0
  description: >
    Single source of truth for the library API (ADR 0004). All three repos
    (backend, web, android) derive their DTO shapes from this file. T-001 defines
    the public, read-only catalog listing.
servers:
  - url: http://localhost:8080
    description: Local gateway

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      tags: [ops]
      responses:
        "200":
          description: The gateway is serving.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /books:
    get:
      operationId: listBooks
      summary: List books
      description: >
        Public catalog listing. No authentication, no writes. Returns a page of
        books in a { data, pagination } envelope.
      tags: [catalog]
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number. Clamped to a minimum of 1.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Items per page. Clamped to the range [1, 100].
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: shelf
          in: query
          required: false
          description: >
            Book-finder filter: narrow to books on this exact shelf label.
            Combinable with row and with page/page_size.
          schema:
            type: string
        - name: row
          in: query
          required: false
          description: >
            Book-finder filter: narrow to books in this exact row. Combinable
            with shelf and with page/page_size.
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A page of books (after any shelf/row filtering).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"
        "500":
          description: Unexpected backend failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /books/{id}:
    get:
      operationId: getBook
      summary: Get a book by id
      description: Public book detail. No authentication, no writes.
      tags: [catalog]
      parameters:
        - name: id
          in: path
          required: true
          description: Book id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The book.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: No book with this id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Unexpected backend failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Book:
      type: object
      required: [id, title, author, isbn, shelf, row, available]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        shelf:
          type: string
        row:
          type: integer
          format: int32
        available:
          type: boolean

    Pagination:
      type: object
      required: [page, page_size, total, total_pages]
      properties:
        page:
          type: integer
          format: int32
          description: 1-based page number echoed back.
        page_size:
          type: integer
          format: int32
          description: Items per page applied (after clamping).
        total:
          type: integer
          format: int64
          description: Total number of books across all pages.
        total_pages:
          type: integer
          format: int32
          description: Number of pages at this page_size.

    BookList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Error:
      type: object
      description: Flat error body returned by 4xx/5xx responses.
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code, e.g. "not_found".
        message:
          type: string
          description: Human-readable explanation.
