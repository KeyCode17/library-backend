openapi: 3.1.0
info:
  title: Library Backend API
  version: 0.1.0
  description: >
    Single source of truth for the library API (ADR 0004). All three repos
    (backend, web, android) derive their DTO shapes from this file. T-001 defines
    the public, read-only catalog listing.
servers:
  - url: http://localhost:8080
    description: Local gateway

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      tags: [ops]
      responses:
        "200":
          description: The gateway is serving.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /books:
    get:
      operationId: listBooks
      summary: List books
      description: >
        Public catalog listing. No authentication, no writes. Returns a page of
        books in a { data, pagination } envelope.
      tags: [catalog]
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number. Clamped to a minimum of 1.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Items per page. Clamped to the range [1, 100].
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: shelf
          in: query
          required: false
          description: >
            Book-finder filter: narrow to books on this exact shelf label.
            Combinable with row and with page/page_size.
          schema:
            type: string
        - name: row
          in: query
          required: false
          description: >
            Book-finder filter: narrow to books in this exact row. Combinable
            with shelf and with page/page_size.
          schema:
            type: integer
            format: int32
        - name: isbn
          in: query
          required: false
          description: >
            Book-finder filter: narrow to books with this exact ISBN. Lets a
            client resolve a scanned barcode to a book server-side.
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: >
            Free-text search: case-insensitive substring match over title, author,
            and ISBN. Combinable with the other filters and pagination.
          schema:
            type: string
      responses:
        "200":
          description: A page of books (after any shelf/row/ISBN/text filtering).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"
        "500":
          description: Unexpected backend failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /books/{id}:
    get:
      operationId: getBook
      summary: Get a book by id
      description: Public book detail. No authentication, no writes.
      tags: [catalog]
      parameters:
        - name: id
          in: path
          required: true
          description: Book id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The book.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: No book with this id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Unexpected backend failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      operationId: register
      summary: Self-register (creates a member)
      description: >
        Public self-registration. Always creates a `member`; elevated roles are
        granted only by an admin via POST /users/{id}/roles.
      tags: [iam]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "201":
          description: The created user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "400":
          description: Invalid email or weak password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      operationId: login
      summary: Exchange credentials for a JWT
      description: >
        Returns the JWT in the body (android sends it as `Authorization: Bearer`)
        AND sets it as an `HttpOnly`, `SameSite=Lax` `session` cookie (web; `Secure`
        is added in production). Protected endpoints accept EITHER the bearer header
        (which takes precedence) or the cookie.
      tags: [iam]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "200":
          description: >
            A signed bearer token (also set as the `session` cookie via Set-Cookie).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials (unknown email or wrong password).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      summary: Clear the session cookie
      description: >
        Expires the `session` cookie (`Set-Cookie: session=; Max-Age=0`). Bearer
        clients simply discard their token; this is a no-op for them.
      tags: [iam]
      responses:
        "204":
          description: Session cleared.

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: The current authenticated principal
      tags: [iam]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMe
      summary: Update your own account (email)
      tags: [iam]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: The updated principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMe
      summary: Delete your own account
      tags: [iam]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Account deleted.
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Refused — you are the last admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/change-password:
    post:
      operationId: changePassword
      summary: Change your own password
      tags: [iam]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed.
        "400":
          description: New password too weak.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated, or the current password is wrong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify an email with a token
      description: Public; the token from the verification email authenticates the call.
      tags: [iam]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "204":
          description: Email verified.
        "400":
          description: Token invalid, expired, or already used.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request a password-reset email
      description: >
        Public. Always returns 202 regardless of whether the email exists (no user
        enumeration); a reset link is emailed only if the account exists.
      tags: [iam]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "202":
          description: Accepted (whether or not the email exists).

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Reset a password with a token
      description: Public; the token from the reset email authenticates the call.
      tags: [iam]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "204":
          description: Password reset.
        "400":
          description: Token invalid/expired/used, or the new password is too weak.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users:
    get:
      operationId: listUsers
      summary: List users (admin only)
      tags: [iam]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: A page of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createUser
      summary: Create a user (admin only)
      tags: [iam]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: The created user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "400":
          description: Invalid email or weak password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}:
    patch:
      operationId: updateUser
      summary: Update a user's email/active flag (admin only)
      tags: [iam]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email in use, or would lock out the last admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteUser
      summary: Delete a user (admin only)
      tags: [iam]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted.
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Refused — would remove the last admin (or yourself).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}/roles:
    post:
      operationId: assignRole
      summary: Assign a role to a user (admin only)
      tags: [iam]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Target user id.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "200":
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans:
    get:
      operationId: listLoans
      summary: List loans
      description: >
        A member sees only their own loans; staff (librarian/admin) see all loans.
      tags: [lending]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: A page of loans.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanList"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: borrowBook
      summary: Borrow a book
      description: >
        Opens an active loan and flips the book unavailable. Any authenticated
        user may borrow an available book.
      tags: [lending]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BorrowRequest"
      responses:
        "201":
          description: The created loan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such book.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: The book is not available to borrow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans/{id}/return:
    post:
      operationId: returnLoan
      summary: Return a borrowed book
      description: >
        The borrower returns their own loan; staff may return any. Flips the book
        available again.
      tags: [lending]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Loan id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The returned loan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the owner and not staff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such loan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: The loan is not in a returnable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans/{id}/approve:
    post:
      operationId: approveLoan
      summary: Approve a returned loan (staff only)
      description: Staff confirm a returned loan, closing it. Members are forbidden.
      tags: [lending]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Loan id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The approved loan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not staff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such loan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: The loan is not awaiting approval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /recommend:
    post:
      operationId: recommend
      summary: Rank books for a user's preferences
      description: >
        Public. Ranks candidate books for the given preferences using the shared
        decision-tree recommender — the same logic the mobile app runs on-device
        via the UniFFI binding. Supply `candidates` to rank a specific set, or omit
        it to rank the server's catalog. No authentication: preferences come from
        the body, not from stored user data.
      tags: [recommender]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendRequest"
      responses:
        "200":
          description: Ranked candidate ids, best match first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendResponse"

  /chat/rooms/{room}/messages:
    get:
      operationId: chatHistory
      summary: Room message history
      description: >
        Paginated chat history for a room (oldest first). Any authenticated user
        may read a room (group chat).
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - name: room
          in: path
          required: true
          description: Room key (an event id, a book category, or "ask-a-librarian").
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: A page of messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageList"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /ws/chat:
    get:
      operationId: chatWebSocket
      summary: Group chat WebSocket (upgrade)
      description: >
        WebSocket endpoint for live group chat (ADR 0006). OpenAPI cannot model the
        stream itself, so the protocol is documented here; frontends derive the
        chat DTOs from `ChatSend` and `ChatMessage` below.


        Connect: `GET /ws/chat?room=<room>&token=<jwt>` with the standard
        `Upgrade: websocket` headers. Auth: the `token` query param carries the IAM
        JWT (browsers cannot set headers on a WS handshake); `Authorization: Bearer
        <jwt>` is also accepted. Unauthenticated upgrades are rejected with `401`
        before the protocol switch.


        Client → server frames: JSON matching `ChatSend` (`{ body }`). Each is
        persisted to history and broadcast to every connection in the same room.


        Server → client frames: JSON matching `ChatMessage`. Past history is read
        over REST via `GET /chat/rooms/{room}/messages`.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - name: room
          in: query
          required: true
          description: Room key to join.
          schema:
            type: string
        - name: token
          in: query
          required: false
          description: IAM JWT (the browser-friendly alternative to the Authorization header).
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols — the WebSocket is established.
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/devices:
    post:
      operationId: registerDevice
      summary: Register an FCM device token
      description: >
        Register (or refresh) an FCM push token for the authenticated user, so the
        due-date scheduler can reach their device.
      tags: [notification]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistration"
      responses:
        "201":
          description: The registered device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Empty/invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications:
    get:
      operationId: listNotifications
      summary: Reminder history
      description: >
        The authenticated user's reminder history. Reminders are produced by an
        internal background scheduler (ADR 0006) that periodically scans loan due
        dates and pushes due-soon/overdue reminders via FCM — it is not a
        request-driven endpoint, so it has no path of its own.
      tags: [notification]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: A page of reminders.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT issued by POST /auth/login, sent in the Authorization header as a Bearer
        token (android). Takes precedence over the cookie when both are present.
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: >
        Same JWT, set by POST /auth/login as an HttpOnly, SameSite=Lax cookie
        (`Secure` in production), cleared by POST /auth/logout (web). Protected
        operations accept bearerAuth OR cookieAuth. CSRF posture: SameSite=Lax plus
        JSON-only, non-GET state changes mitigate CSRF; no double-submit token is
        used (kept simple). CORS is first-party only (the web dev server proxies
        `/api`); if cross-origin with credentials is ever needed, set
        Access-Control-Allow-Credentials with a specific origin (never `*`).
  schemas:
    Book:
      type: object
      required: [id, title, author, isbn, shelf, row, available]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        shelf:
          type: string
        row:
          type: integer
          format: int32
        available:
          type: boolean

    Pagination:
      type: object
      required: [page, page_size, total, total_pages]
      properties:
        page:
          type: integer
          format: int32
          description: 1-based page number echoed back.
        page_size:
          type: integer
          format: int32
          description: Items per page applied (after clamping).
        total:
          type: integer
          format: int64
          description: Total number of books across all pages.
        total_pages:
          type: integer
          format: int32
          description: Number of pages at this page_size.

    BookList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Error:
      type: object
      description: Flat error body returned by 4xx/5xx responses.
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code, e.g. "not_found".
        message:
          type: string
          description: Human-readable explanation.

    Role:
      type: string
      description: A user role.
      enum: [admin, librarian, member]

    Credentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    AuthToken:
      type: object
      required: [token, token_type, expires_in]
      properties:
        token:
          type: string
          description: Signed JWT bearer token.
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: Token lifetime in seconds.

    Principal:
      type: object
      description: A user record without the password hash.
      required: [id, email, role, verified, active]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        verified:
          type: boolean
        active:
          type: boolean

    UserSummary:
      type: object
      description: Admin view of a user (never the password hash).
      required: [id, email, role, verified, active, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        verified:
          type: boolean
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        pagination:
          $ref: "#/components/schemas/Pagination"

    AssignRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"

    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: "#/components/schemas/Role"

    UpdateUserRequest:
      type: object
      description: Any subset of the updatable fields.
      properties:
        email:
          type: string
          format: email
        active:
          type: boolean

    UpdateMeRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 8

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          format: password
          minLength: 8

    LoanStatus:
      type: string
      description: >
        Loan lifecycle status. `borrowed` → `returned` → `approved`. Overdue is
        derived from `due_at`, not a stored status.
      enum: [borrowed, returned, approved]

    BorrowRequest:
      type: object
      required: [book_id]
      properties:
        book_id:
          type: string
          format: uuid

    Loan:
      type: object
      required: [id, book_id, user_id, status, borrowed_at, due_at]
      properties:
        id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/LoanStatus"
        borrowed_at:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        returned_at:
          type: [string, "null"]
          format: date-time
        approved_by:
          type: [string, "null"]
          format: uuid
        approved_at:
          type: [string, "null"]
          format: date-time

    LoanList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Loan"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Preferences:
      type: object
      description: What the user likes. Empty arrays mean no preference on that axis.
      properties:
        preferred_shelves:
          type: array
          items:
            type: string
        preferred_authors:
          type: array
          items:
            type: string
        available_only:
          type: boolean
          default: false

    RecommendCandidate:
      type: object
      required: [id, shelf, author, available]
      properties:
        id:
          type: string
          format: uuid
        shelf:
          type: string
        author:
          type: string
        available:
          type: boolean

    RecommendRequest:
      type: object
      properties:
        preferences:
          $ref: "#/components/schemas/Preferences"
        candidates:
          type: array
          description: Explicit candidates to rank; omit to rank the server catalog.
          items:
            $ref: "#/components/schemas/RecommendCandidate"

    RecommendResponse:
      type: object
      required: [ranked]
      properties:
        ranked:
          type: array
          description: Candidate book ids, best match first.
          items:
            type: string
            format: uuid

    ChatMessage:
      type: object
      description: A stored/broadcast chat message (server → client).
      required: [id, room, user_id, body, created_at]
      properties:
        id:
          type: string
          format: uuid
        room:
          type: string
        user_id:
          type: string
          format: uuid
        body:
          type: string
        created_at:
          type: string
          format: date-time

    ChatSend:
      type: object
      description: A message the client sends over the socket (client → server).
      required: [body]
      properties:
        body:
          type: string

    ChatMessageList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Platform:
      type: string
      enum: [android, ios, web]

    ReminderKind:
      type: string
      description: Why a reminder fired.
      enum: [due_soon, overdue]

    DeviceRegistration:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
          description: FCM registration token.
        platform:
          $ref: "#/components/schemas/Platform"

    Device:
      type: object
      required: [id, user_id, token, platform, registered_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        token:
          type: string
        platform:
          $ref: "#/components/schemas/Platform"
        registered_at:
          type: string
          format: date-time

    Notification:
      type: object
      description: A logged due-date reminder.
      required: [id, user_id, loan_id, kind, message, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        loan_id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/ReminderKind"
        message:
          type: string
        created_at:
          type: string
          format: date-time

    NotificationList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        pagination:
          $ref: "#/components/schemas/Pagination"
